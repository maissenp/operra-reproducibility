services:
  nextflow:
    build:
      context: .
      args:
        NEXTFLOW_TAG: "26.04.0"
    image: operra-nextflow-demo:26.04.0
    working_dir: /workspace
    volumes:
      - .:/workspace
    # Keep the container running so people can exec into it and run nextflow.
    command: ["sh", "-lc", "sleep infinity"]
    tty: true

