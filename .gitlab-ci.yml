image: rocker/verse:4.5.0

pages:
  stage: deploy
  before_script:
  # Install renv and restore project dependencies
  - R -e "install.packages('renv')"
  - R -e "renv::restore(confirm = FALSE)"
    
  script: 
  - cd contents
  - quarto render
  - mkdir ../public/
  - cp -r ./_site/* ../public/

 
  artifacts:    
    paths:
    - public    
    
  only:
  - main
  interruptible: true
